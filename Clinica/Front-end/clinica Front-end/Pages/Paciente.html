<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Paciente</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="../Asset/css/Pages.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>

    <div class="container mt-5">
        <h1>Registrar Paciente</h1>
        <button class="btn btn-primary mb-3" id="agregarPacienteBtn" data-bs-toggle="modal"
            data-bs-target="#modalPaciente">Registrar Paciente</button>
        <div class="float-end mb-3">
            <input type="search" id="searchPaciente" class="form-control" placeholder="Buscar...">
        </div>
        <table id="pacienteTable" class="table table-striped table-bordered">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tipo Documento</th>
                    <th>Documento de Identidad</th>
                    <th>Primer Nombre</th>
                    <th>Segundo Nombre</th>
                    <th>Primer Apellido</th>
                    <th>Segundo Apellido</th>
                    <th>Celular</th>
                    <th>correo Electronico</th>
                    <th>Nombre de acudiente</th>
                    <th>Numero de acudiente</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="modal fade" id="modalPaciente" tabindex="-1" aria-labelledby="modalPacienteLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalPacienteLabel">Registro de Paciente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="PacienteForm">
                        <div class="row mb-3">
                            <div class="col-sm-6">
                                <label for="documentType" class="form-label">Tipo de Documento</label>
                                <select class="form-select" id="documentType" required>
                                    <option value="Cedula de Ciudadania">C.C</option>
                                    <option value="Pasaporte">P.S</option>
                                    <option value="Cedula de Extranjería">C.E</option>
                                </select>
                            </div>
                            <div class="col-sm-6">
                                <label for="document" class="form-label">Documento de Identidad:</label>
                                <input type="text" class="form-control" id="document" required />
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-sm-6">
                                <label for="firstName" class="form-label">Primer Nombre:</label>
                                <input type="text" class="form-control" id="firstName" required />
                            </div>
                            <div class="col-sm-6">
                                <label for="secondName" class="form-label">Segundo Nombre:</label>
                                <input type="text" class="form-control" id="secondName" />
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-sm-6">
                                <label for="firstLastName" class="form-label">Primer Apellido:</label>
                                <input type="text" class="form-control" id="firstLastName" required />
                            </div>
                            <div class="col-sm-6">
                                <label for="secondLastName" class="form-label">Segundo Apellido:</label>
                                <input type="text" class="form-control" id="secondLastName" />
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-sm-6">
                                <label for="mail" class="form-label">Correo:</label>
                                <input type="text" class="form-control" id="mail" required />
                            </div>
                            <div class="col-sm-6">
                                <label for="phoneNumber" class="form-label">Celular:</label>
                                <input type="email" class="form-control" id="phoneNumber" required />
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-sm-6">
                                <label for="contactPersonName" class="form-label">Nombre del acudiente:</label>
                                <input type="text" class="form-control" id="contactPersonName" required />
                            </div>
                            <div class="col-sm-6">
                                <label for="contactPersonPhone" class="form-label">Número del acudiente:</label>
                                <input type="text" class="form-control" id="contactPersonPhone" required />
                            </div>
                            <div class="col-sm-6">
                                <label for="status" class="form-label">Estado:</label>
                                <select id="status" class="form-select" required>
                                    <option value="false">Habilitado</option>
                                    <option value="true">Deshabilitado</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer d-flex justify-content-center">
                    <!-- <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button> -->
                    <button type="button" class="btn btn-primary" id="guardarPaciente">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/2.0.3/js/dataTables.min.js"></script>
    <script src="../Asset/js/Pacientes.js"></script>
</body>

</html>
