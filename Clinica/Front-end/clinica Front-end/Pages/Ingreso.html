<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Ingreso</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <h1>Registro de Ingreso</h1>
        <div id="fechaSuperior" class="mb-3"></div>
        <button class="btn btn-primary mb-3" id="agregarIngresoBtn" data-bs-toggle="modal"
            data-bs-target="#modalIngreso">Registrar Ingreso</button>
        <div class="float-end mb-3">
            <input type="search" id="searchMedico" class="form-control" placeholder="Buscar...">
        </div>
        <div class="table-responsive">
            <table id="IngresoTable" class="table table-striped table-bordered">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Habitación</th>
                        <th>Cama</th>
                        <th>Paciente</th>
                        <th>Médico</th>
                        <th>Fecha de Ingreso</th>
                        <th>Fecha de Salida</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

    </div>

    <div class="modal fade" id="modalIngreso" tabindex="-1" aria-labelledby="modalIngresoLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalIngresoLabel">Registro de Ingreso</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="IngresoForm">
                        <div class="row mb-3">
                            <div class="col-sm-6">
                                <label for="room" class="form-label">Habitación:</label>
                                <input type="text" id="room" name="room" class="form-control" required>
                            </div>
                            <div class="col-sm-6">
                                <label for="bed" class="form-label">Cama:</label>
                                <input type="text" id="bed" name="bed" class="form-control" required>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-sm-6">
                                <label for="patient" class="form-label">Paciente:</label>
                                <input type="text" id="patient" name="patient" class="form-control" required disabled>
                                <button type="button" class="btn btn-link p-0" id="selectPatientBtn"
                                    onclick=" $('#modalSeleccionPaciente').modal('show');">
                                    <i class="bi bi-search"></i>
                                </button>
                            </div>
                            <div class="col-sm-6">
                                <label for="doctor" class="form-label">Médico:</label>
                                <input type="text" id="doctor" name="doctor" class="form-control" required disabled>
                                <button type="button" class="btn btn-link p-0" id="selectDoctorBtn"
                                    onclick="$('#modalSeleccionDoctor').modal('show');">
                                    <i class="bi bi-search"></i>
                                </button>
                            </div>
                        </div>
                        <!-- <div class="row mb-3">
                            <div class="col-sm-6">
                                <label for="status" class="form-label">Estado:</label>
                                <select id="status" name="status" class="form-select" required>
                                    <option value="observacion">Observación</option>
                                    <option value="alta">Dar de alta</option>
                                    <option value="des">desvivido</option>
                                </select>
                            </div>
                        </div> -->
                    </form>
                </div>
                <div class="modal-footer d-flex justify-content-center">
                    <button type="button" class="btn btn-primary" id="guardarIngreso">Guardar Ingreso</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Selección de Paciente -->
    <div class="modal fade" id="modalSeleccionPaciente" tabindex="-1" aria-labelledby="modalSeleccionPacienteLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalSeleccionPacienteLabel">Seleccionar Paciente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                </div>
                <div class="modal-footer d-flex justify-content-center">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Seleccionar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Selección del medico -->
    <div class="modal fade" id="modalSeleccionDoctor" tabindex="-1" aria-labelledby="modalSeleccionDoctorLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title " id="modalSeleccionDoctorLabel">Seleccionar Medico</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                </div>
                <div class="modal-footer d-flex justify-content-center">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Seleccionar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/2.0.3/js/dataTables.min.js"></script>
    <script src="../Asset/js/Ingreso.js"></script>
</body>

</html>
