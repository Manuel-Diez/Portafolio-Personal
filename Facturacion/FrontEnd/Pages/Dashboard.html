<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T.N.T Balack Motos</title>
    <!-- BOX ICONS -->
    <link href='https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css' rel='stylesheet'>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../asset/css/style.css">
</head>

<body>
    <div class="top-menu">
        <div class="logo-container">
            <div class="logo">
                <img src="../asset/img/Diseño sin título.png" alt="Logo" class="img-fluid" style="height: 30px;">
                <span>T.N.T</span>
            </div>
            <div class="menu-actions">
                <div class="toggle" onclick="toggleSidebar()">
                    <i class='bx bx-menu'></i>
                </div>
            </div>
        </div>
        <!-- Search Input -->
        <div class="input-search">
            <input type="text" class="input" placeholder="Buscar">
        </div>
    </div>

    <div class="sidebar" id="sidebarMenu">
        <div class="sidebar-header">
            <button class="close-btn" onclick="toggleSidebar()">×</button>
            <img src="../asset/img/Diseño sin título.png" alt="Logo" class="sidebar-logo">
            <h2>T.N.T</h2>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link" href="#" onclick="loadContent('Dashboard.html'); return false;">
                    <i class='bx bx-grid-alt'></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" onclick="loadContent('Usuarios.html'); return false;">
                    <i class="bx bx-user"></i>
                    <span>Usuarios</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" onclick="loadContent('Pedidos.html'); return false;">
                    <i class="bx bx-cart"></i>
                    <span>Pedidos</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" onclick="loadContent('Inventario.html'); return false;">
                    <i class='bx bx-list-plus'></i>
                    <span>Inventario</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" onclick="loadContent('Mensajes.html'); return false;">
                    <i class="bx bx-message-square"></i>
                    <span>Mensajes</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" onclick="loadContent('Configuracion.html'); return false;">
                    <i class="bx bx-cog"></i>
                    <span>Configuración</span>
                </a>
            </li>
        </ul>
    </div>

    <div class="main-content" id="mainContent">
        <iframe id="workSpace" name="workSpace" class="w-100" height="850" src="Dashboard.html"></iframe>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
    <!-- Custom JS -->
    <script src="../asset/js/ap.js" defer></script>
    <script>
        function loadContent(url) {
            document.getElementById('workSpace').src = url;
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebarMenu');
            sidebar.classList.toggle('active');
        }
    </script>
</body>

</html>
